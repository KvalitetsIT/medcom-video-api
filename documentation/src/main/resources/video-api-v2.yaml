        - keycloakOIDC: []
      tags:
        - Video Meetings V2
      summary: find meeting by uri with domain.
      description: >-
        Find meeting by uri with domain. <br> <br> 
        The following values of the user role claim grants access: <br>
        * meeting-admin <br>
        * meeting-user <br>
        * meeting-planner <br>
